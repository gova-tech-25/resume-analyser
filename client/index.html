<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResuMind | AI-Powered Resume Analyser & ATS Checker</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Analyse your resume for ATS systems with deep AI resume analysis. Get instant ratings, keyword suggestions, formatting checks, and professional rewrite suggestions.">
  <meta name="keywords" content="resume analyser, cv checker, ats score, ats analysis, ai resume review, formatting feedback">
  <meta name="author" content="ResuMind AI">
  
  <!-- Google Fonts - Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- React & React DOM CDNs (Production versions) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone for in-browser JSX parsing -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS 3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#10b981', // emerald-500
              600: '#059669',
              700: '#047857',
              800: '#065f46',
              900: '#064e3b',
            },
            slate: {
              950: '#070a13',
            }
          },
          animation: {
            'glow-slow': 'glow 8s ease-in-out infinite alternate',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'spin-slow': 'spin 6s linear infinite',
          },
          keyframes: {
            glow: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.15)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.95)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar Styles */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #070a13;
    }
    ::-webkit-scrollbar-thumb {
      background: #1f2937;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }

    /* Glassmorphism utility classes */
    .glass-card {
      background: rgba(17, 25, 40, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .glass-header {
      background: rgba(11, 17, 30, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-hero-container {
      background: rgba(9, 15, 27, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    
    .glass-input {
      background: rgba(17, 25, 40, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: white;
    }
    
    .glass-input:focus {
      border-color: rgba(16, 185, 129, 0.5);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.15);
      outline: none;
    }

    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(135deg, #ffffff 30%, #a7f3d0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }


    .gradient-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }

    /* Selection styled text */
    ::selection {
      background: rgba(16, 185, 129, 0.3);
      color: white;
    }

    /* Holographic Scanner Animations */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes scan {
      0% { top: 0%; opacity: 0.2; }
      50% { top: 100%; opacity: 1; }
      100% { top: 0%; opacity: 0.2; }
    }
    
    @keyframes beam-pulse {
      0% { opacity: 0.15; transform: scaleX(0.95); }
      50% { opacity: 0.4; transform: scaleX(1.05); }
      100% { opacity: 0.15; transform: scaleX(0.95); }
    }
    
    @keyframes orbit-1 {
      0% { transform: translate(-40px, -20px) scale(0.85); opacity: 0.4; }
      50% { transform: translate(40px, 15px) scale(1.1); opacity: 0.9; }
      100% { transform: translate(-40px, -20px) scale(0.85); opacity: 0.4; }
    }
    
    @keyframes orbit-2 {
      0% { transform: translate(30px, 25px) scale(1.15); opacity: 0.9; }
      50% { transform: translate(-35px, -15px) scale(0.8); opacity: 0.3; }
      100% { transform: translate(30px, 25px) scale(1.15); opacity: 0.9; }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }
    
    .animate-scan {
      animation: scan 2.5s ease-in-out infinite;
    }
    
    .animate-beam {
      animation: beam-pulse 3s ease-in-out infinite;
    }
    
    .animate-orbit-1 {
      animation: orbit-1 7s ease-in-out infinite;
    }
    
    .animate-orbit-2 {
      animation: orbit-2 9s ease-in-out infinite;
    }
    
    .scene-3d {
      perspective: 1200px;
    }
    
    .scanner-isometric {
      transform: rotateX(55deg) rotateZ(-45deg);
      transform-style: preserve-3d;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden relative font-sans">
  
  <!-- Backdrop Radial Mesh Glow -->
  <div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-950/20 blur-[120px] animate-glow-slow"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-blue-950/15 blur-[150px] animate-glow-slow" style="animation-delay: -3s;"></div>
  </div>

  <div id="root" class="relative z-10"></div>

  <!-- React Application Script -->
  <script type="text/babel" src="app.js"></script>
</body>
</html>
